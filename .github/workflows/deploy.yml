name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Configure Astro deployment paths
        run: |
          site="${{ vars.SITE }}"
          if [ -z "$site" ]; then
            site="https://${{ github.repository_owner }}.github.io"
          fi

          base_path="${{ vars.BASE_PATH }}"
          if [ -z "$base_path" ]; then
            if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
              base_path="/"
            else
              base_path="/${{ github.event.repository.name }}"
            fi
          fi

          echo "SITE=$site" >> "$GITHUB_ENV"
          echo "BASE_PATH=$base_path" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
